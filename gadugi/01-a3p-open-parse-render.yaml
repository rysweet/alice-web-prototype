# Level 3: A3P Project Open / Parse / Render Cycle
# Tests the complete lifecycle of opening an Alice project: launch server with
# a .a3p project path, verify the parser extracts scene objects, capture screenshot.
# Java parity: ProjectImp.open() → SceneImp.render()

scenario:
  name: "A3P Open / Parse / Render"
  description: |
    Verifies the full .a3p project lifecycle through the HTTP API:
    launch the server with a project file, confirm the parser extracts
    scene objects and project name, then capture a rendered screenshot.
    Maps to Java Alice's ProjectImp.open() → SceneImp.render() pipeline.
  type: cli
  level: 3

  tags: [alice, integration, a3p, parse, render, java-parity]

  agents:
    - name: cli
      type: cli

  prerequisites:
    - "npm run build:server has been run"
    - "Valid .a3p file exists at the path set in A3P_FILE env var"

  environment:
    variables:
      PORT: "${PORT:-3000}"
      EVIDENCE_DIR: "./evidence/01-a3p-open-parse-render"
      A3P_FILE: "${A3P_FILE}"

  steps:
    - name: "Run A3P open, parse, and render flow"
      agent: cli
      action: execute
      target: >-
        bash -lc 'set -euo pipefail;
        PORT="${PORT:-3000}";
        EVIDENCE_DIR="./evidence/01-a3p-open-parse-render";
        A3P_FILE="${A3P_FILE:-.test-roundtrip/modified.a3p}";
        HEALTH_JSON="$EVIDENCE_DIR/health.json";
        LAUNCH_JSON="$EVIDENCE_DIR/launch.json";
        SCREENSHOT_JSON="$EVIDENCE_DIR/screenshot.json";
        SERVER_LOG="$EVIDENCE_DIR/server.log";
        rm -rf "$EVIDENCE_DIR";
        mkdir -p "$EVIDENCE_DIR";
        node dist-server/cli.js serve --port "$PORT" --evidence-dir "$EVIDENCE_DIR" --project "$A3P_FILE" >"$SERVER_LOG" 2>&1 &
        SERVER_PID=$!;
        cleanup() { status=$?; if [ -n "${SERVER_PID:-}" ] && kill -0 "$SERVER_PID" 2>/dev/null; then kill "$SERVER_PID" 2>/dev/null || true; wait "$SERVER_PID" 2>/dev/null || true; fi; rm -rf "$EVIDENCE_DIR"; exit "$status"; };
        trap cleanup EXIT;
        READY=0;
        for attempt in $(seq 1 50); do if curl -fsS "http://127.0.0.1:$PORT/api/health" >"$HEALTH_JSON"; then READY=1; break; fi; sleep 0.2; done;
        test "$READY" = 1;
        grep -Eq "\"status\"[[:space:]]*:[[:space:]]*\"listening\"" "$SERVER_LOG";
        node -e "const fs=require(\"fs\"); const d=JSON.parse(fs.readFileSync(process.argv[1], \"utf8\")); if (d.status !== \"running\") throw new Error(\"health status was not running\"); if (d.runtime !== \"typescript-web-prototype\") throw new Error(\"unexpected runtime\");" "$HEALTH_JSON";
        curl -fsS -X POST "http://127.0.0.1:$PORT/api/launch" -H "Content-Type: application/json" -d "{\"project\":\"$A3P_FILE\"}" >"$LAUNCH_JSON";
        node -e "const fs=require(\"fs\"); const d=JSON.parse(fs.readFileSync(process.argv[1], \"utf8\")); if (d.status !== \"launched\") throw new Error(\"project did not launch\"); if (!d.projectName) throw new Error(\"projectName missing\"); if (d.sceneObjectCount < 2) throw new Error(\"expected at least 2 scene objects\");" "$LAUNCH_JSON";
        curl -fsS "http://127.0.0.1:$PORT/api/screenshot" >"$SCREENSHOT_JSON";
        node -e "const fs=require(\"fs\"); const d=JSON.parse(fs.readFileSync(process.argv[1], \"utf8\")); if (d.status !== \"captured\") throw new Error(\"screenshot was not captured\"); if (d.objectCount < 2) throw new Error(\"expected at least 2 screenshot objects\");" "$SCREENSHOT_JSON";
        kill "$SERVER_PID";
        wait "$SERVER_PID" 2>/dev/null || true;
        SERVER_PID="";
        grep -q "shutting down" "$SERVER_LOG"'
      timeout: 30000
      expected: ""

  cleanup:
    - action: stop_application
      signal: SIGTERM
      timeout: 5s
      description: "Ensure server process is terminated"

    - action: shell
      command: "rm -rf ${EVIDENCE_DIR}"
      description: "Remove evidence artifacts"
