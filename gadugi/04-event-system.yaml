# Level 3: Event System -- Register, Fire, Collision
# Tests sceneActivated, keyPress, and proximity event flows.
# No .a3p file needed -- server seeds default ground + camera on launch.
# Java parity: EventManager listener registration and dispatch

scenario:
  name: "Event System"
  description: |
    Verifies the event system through the HTTP API: register handlers for
    sceneActivated, keyPress, and proximity events; fire each event type
    and verify the correct handlers trigger (or don't). Tests sequential
    ID assignment, key filtering, and proximity distance checks.
    Maps to Java Alice's EventManager listener pipeline.
  type: cli
  level: 3
  metadata:
    flow: server-flow

  tags: [alice, integration, events, register, fire, proximity, java-parity, server-flow]

  agents:
    - name: cli
      type: cli

  prerequisites:
    - "npm run build:server has been run"

  steps:
    - name: "Run event registration and firing flow"
      agent: cli
      action: execute
      target: >-
        bash -lc 'set -euo pipefail;
        PORT="${PORT:-3104}";
        case "$PORT" in (*[!0-9]*|"") echo "PORT must be numeric" >&2; exit 2;; esac;
        API_TOKEN="gadugi-local-api-token";
        EVIDENCE_DIR="./evidence/04-event-system-$$";
        case "$EVIDENCE_DIR" in (""|"/"|".") echo "unsafe EVIDENCE_DIR: $EVIDENCE_DIR" >&2; exit 2;; esac;
        HEALTH_JSON="$EVIDENCE_DIR/health.json";
        LAUNCH_JSON="$EVIDENCE_DIR/launch.json";
        SCENE_EVENT_JSON="$EVIDENCE_DIR/register-scene-activated.json";
        KEY_EVENT_JSON="$EVIDENCE_DIR/register-key-press.json";
        BUNNY_JSON="$EVIDENCE_DIR/add-bunny.json";
        CAT_JSON="$EVIDENCE_DIR/add-cat.json";
        PROXIMITY_JSON="$EVIDENCE_DIR/register-proximity.json";
        MISSING_TYPE_JSON="$EVIDENCE_DIR/register-missing-type.json";
        UNKNOWN_TYPE_JSON="$EVIDENCE_DIR/register-unknown-type.json";
        MISSING_KEY_JSON="$EVIDENCE_DIR/register-missing-key.json";
        UNKNOWN_OBJECT_JSON="$EVIDENCE_DIR/register-unknown-object.json";
        WRONG_TARGETS_JSON="$EVIDENCE_DIR/register-wrong-targets.json";
        FIRE_SCENE_JSON="$EVIDENCE_DIR/fire-scene-activated.json";
        FIRE_SPACE_JSON="$EVIDENCE_DIR/fire-space.json";
        FIRE_ARROW_JSON="$EVIDENCE_DIR/fire-arrow-up.json";
        FIRE_PROXIMITY_JSON="$EVIDENCE_DIR/fire-proximity.json";
        FIRE_MISSING_TYPE_JSON="$EVIDENCE_DIR/fire-missing-type.json";
        FIRE_UNKNOWN_TYPE_JSON="$EVIDENCE_DIR/fire-unknown-type.json";
        SERVER_LOG="$EVIDENCE_DIR/server.log";
        SERVER_PID="";
        rm -rf "$EVIDENCE_DIR";
        mkdir -p "$EVIDENCE_DIR";
        cleanup() { status=$?; if [ -n "${SERVER_PID:-}" ] && kill -0 "$SERVER_PID" 2>/dev/null; then kill "$SERVER_PID" 2>/dev/null || true; wait "$SERVER_PID" 2>/dev/null || true; fi; rm -rf "$EVIDENCE_DIR"; exit "$status"; };
        trap cleanup EXIT;
        node dist-server/cli.js serve --port "$PORT" --evidence-dir "$EVIDENCE_DIR" --api-token "$API_TOKEN" >"$SERVER_LOG" 2>&1 &
        SERVER_PID=$!;
        READY=0;
        for attempt in $(seq 1 50); do if curl -fsS "http://127.0.0.1:$PORT/api/health" >"$HEALTH_JSON" 2>/dev/null; then READY=1; break; fi; sleep 0.2; done;
        test "$READY" = 1;
        grep -Eq "\"status\"[[:space:]]*:[[:space:]]*\"listening\"" "$SERVER_LOG";
        node -e "const fs=require(\"fs\"); const d=JSON.parse(fs.readFileSync(process.argv[1], \"utf8\")); if (d.status !== \"running\") throw new Error(\"health status was not running\"); if (d.runtime !== \"alice-web\") throw new Error(\"unexpected runtime\");" "$HEALTH_JSON";
        curl -fsS -X POST "http://127.0.0.1:$PORT/api/launch" -H "X-Alice-Local-Api-Token: $API_TOKEN" -H "Content-Type: application/json" -d "{}" >"$LAUNCH_JSON";
        node -e "const fs=require(\"fs\"); const d=JSON.parse(fs.readFileSync(process.argv[1], \"utf8\")); if (d.status !== \"launched\") throw new Error(\"default scene did not launch\"); if (d.sceneObjectCount !== 2) throw new Error(\"expected default ground and camera\");" "$LAUNCH_JSON";
        curl -fsS -X POST "http://127.0.0.1:$PORT/api/events/register" -H "X-Alice-Local-Api-Token: $API_TOKEN" -H "Content-Type: application/json" -d "{\"eventType\":\"sceneActivated\",\"handlerName\":\"onSceneStart\"}" >"$SCENE_EVENT_JSON";
        node -e "const fs=require(\"fs\"); const d=JSON.parse(fs.readFileSync(process.argv[1], \"utf8\")); if (d.registrationId !== \"evt-1\") throw new Error(\"sceneActivated registration id mismatch\"); if (d.eventType !== \"sceneActivated\") throw new Error(\"sceneActivated event type mismatch\"); if (d.handlerName !== \"onSceneStart\") throw new Error(\"sceneActivated handler mismatch\"); if (!d.evidenceArtifact) throw new Error(\"sceneActivated evidence missing\");" "$SCENE_EVENT_JSON";
        curl -fsS -X POST "http://127.0.0.1:$PORT/api/events/register" -H "X-Alice-Local-Api-Token: $API_TOKEN" -H "Content-Type: application/json" -d "{\"eventType\":\"keyPress\",\"handlerName\":\"onSpacePressed\",\"key\":\"Space\"}" >"$KEY_EVENT_JSON";
        node -e "const fs=require(\"fs\"); const d=JSON.parse(fs.readFileSync(process.argv[1], \"utf8\")); if (d.registrationId !== \"evt-2\") throw new Error(\"keyPress registration id mismatch\"); if (d.eventType !== \"keyPress\") throw new Error(\"keyPress event type mismatch\"); if (d.handlerName !== \"onSpacePressed\") throw new Error(\"keyPress handler mismatch\");" "$KEY_EVENT_JSON";
        curl -fsS -X POST "http://127.0.0.1:$PORT/api/scene/add-object" -H "X-Alice-Local-Api-Token: $API_TOKEN" -H "Content-Type: application/json" -d "{\"className\":\"org.lgna.story.SBiped\",\"name\":\"bunny\"}" >"$BUNNY_JSON";
        node -e "const fs=require(\"fs\"); const d=JSON.parse(fs.readFileSync(process.argv[1], \"utf8\")); if (d.status !== \"added\") throw new Error(\"bunny was not added\"); if (d.objectName !== \"bunny\") throw new Error(\"unexpected bunny name\");" "$BUNNY_JSON";
        curl -fsS -X POST "http://127.0.0.1:$PORT/api/scene/add-object" -H "X-Alice-Local-Api-Token: $API_TOKEN" -H "Content-Type: application/json" -d "{\"className\":\"org.lgna.story.SBiped\",\"name\":\"cat\"}" >"$CAT_JSON";
        node -e "const fs=require(\"fs\"); const d=JSON.parse(fs.readFileSync(process.argv[1], \"utf8\")); if (d.status !== \"added\") throw new Error(\"cat was not added\"); if (d.objectName !== \"cat\") throw new Error(\"unexpected cat name\");" "$CAT_JSON";
        curl -fsS -X POST "http://127.0.0.1:$PORT/api/events/register" -H "X-Alice-Local-Api-Token: $API_TOKEN" -H "Content-Type: application/json" -d "{\"eventType\":\"proximity\",\"handlerName\":\"onBunnyCatClose\",\"targetObjects\":[\"bunny\",\"cat\"],\"threshold\":3.0}" >"$PROXIMITY_JSON";
        node -e "const fs=require(\"fs\"); const d=JSON.parse(fs.readFileSync(process.argv[1], \"utf8\")); if (d.registrationId !== \"evt-3\") throw new Error(\"proximity registration id mismatch\"); if (d.eventType !== \"proximity\") throw new Error(\"proximity event type mismatch\"); if (d.handlerName !== \"onBunnyCatClose\") throw new Error(\"proximity handler mismatch\");" "$PROXIMITY_JSON";
        HTTP_CODE="$(curl -sS -o "$MISSING_TYPE_JSON" -w "%{http_code}" -X POST "http://127.0.0.1:$PORT/api/events/register" -H "X-Alice-Local-Api-Token: $API_TOKEN" -H "Content-Type: application/json" -d "{\"handlerName\":\"orphan\"}")";
        test "$HTTP_CODE" = 400;
        node -e "const fs=require(\"fs\"); const d=JSON.parse(fs.readFileSync(process.argv[1], \"utf8\")); if (d.error !== \"eventType is required\") throw new Error(\"missing registration eventType error mismatch\");" "$MISSING_TYPE_JSON";
        HTTP_CODE="$(curl -sS -o "$UNKNOWN_TYPE_JSON" -w "%{http_code}" -X POST "http://127.0.0.1:$PORT/api/events/register" -H "X-Alice-Local-Api-Token: $API_TOKEN" -H "Content-Type: application/json" -d "{\"eventType\":\"bogusEvent\",\"handlerName\":\"h\"}")";
        test "$HTTP_CODE" = 400;
        node -e "const fs=require(\"fs\"); const d=JSON.parse(fs.readFileSync(process.argv[1], \"utf8\")); if (!d.error.includes(\"unknown eventType\")) throw new Error(\"unknown registration eventType error mismatch\");" "$UNKNOWN_TYPE_JSON";
        HTTP_CODE="$(curl -sS -o "$MISSING_KEY_JSON" -w "%{http_code}" -X POST "http://127.0.0.1:$PORT/api/events/register" -H "X-Alice-Local-Api-Token: $API_TOKEN" -H "Content-Type: application/json" -d "{\"eventType\":\"keyPress\",\"handlerName\":\"noKey\"}")";
        test "$HTTP_CODE" = 400;
        node -e "const fs=require(\"fs\"); const d=JSON.parse(fs.readFileSync(process.argv[1], \"utf8\")); if (d.error !== \"key is required for keyPress events\") throw new Error(\"missing key error mismatch\");" "$MISSING_KEY_JSON";
        HTTP_CODE="$(curl -sS -o "$UNKNOWN_OBJECT_JSON" -w "%{http_code}" -X POST "http://127.0.0.1:$PORT/api/events/register" -H "X-Alice-Local-Api-Token: $API_TOKEN" -H "Content-Type: application/json" -d "{\"eventType\":\"proximity\",\"handlerName\":\"h\",\"targetObjects\":[\"bunny\",\"ghost\"]}")";
        test "$HTTP_CODE" = 400;
        node -e "const fs=require(\"fs\"); const d=JSON.parse(fs.readFileSync(process.argv[1], \"utf8\")); if (!d.error.includes(\"unknown object\")) throw new Error(\"unknown object error mismatch\");" "$UNKNOWN_OBJECT_JSON";
        HTTP_CODE="$(curl -sS -o "$WRONG_TARGETS_JSON" -w "%{http_code}" -X POST "http://127.0.0.1:$PORT/api/events/register" -H "X-Alice-Local-Api-Token: $API_TOKEN" -H "Content-Type: application/json" -d "{\"eventType\":\"proximity\",\"handlerName\":\"h\",\"targetObjects\":[\"bunny\"]}")";
        test "$HTTP_CODE" = 400;
        node -e "const fs=require(\"fs\"); const d=JSON.parse(fs.readFileSync(process.argv[1], \"utf8\")); if (!d.error.includes(\"exactly 2 entries\")) throw new Error(\"wrong targetObjects error mismatch\");" "$WRONG_TARGETS_JSON";
        curl -fsS -X POST "http://127.0.0.1:$PORT/api/events/fire" -H "X-Alice-Local-Api-Token: $API_TOKEN" -H "Content-Type: application/json" -d "{\"eventType\":\"sceneActivated\"}" >"$FIRE_SCENE_JSON";
        node -e "const fs=require(\"fs\"); const d=JSON.parse(fs.readFileSync(process.argv[1], \"utf8\")); if (!Array.isArray(d.triggered)) throw new Error(\"sceneActivated triggered is not an array\"); if (d.triggered.length !== 1) throw new Error(\"expected one sceneActivated handler\"); if (d.triggered[0].id !== \"evt-1\") throw new Error(\"sceneActivated handler id mismatch\"); if (d.triggered[0].handlerName !== \"onSceneStart\") throw new Error(\"sceneActivated handler name mismatch\"); if (!d.evidenceArtifact) throw new Error(\"sceneActivated fire evidence missing\");" "$FIRE_SCENE_JSON";
        curl -fsS -X POST "http://127.0.0.1:$PORT/api/events/fire" -H "X-Alice-Local-Api-Token: $API_TOKEN" -H "Content-Type: application/json" -d "{\"eventType\":\"keyPress\",\"payload\":{\"key\":\"Space\"}}" >"$FIRE_SPACE_JSON";
        node -e "const fs=require(\"fs\"); const d=JSON.parse(fs.readFileSync(process.argv[1], \"utf8\")); if (!Array.isArray(d.triggered)) throw new Error(\"Space triggered is not an array\"); if (d.triggered.length !== 1) throw new Error(\"expected one Space handler\"); if (d.triggered[0].id !== \"evt-2\") throw new Error(\"Space handler id mismatch\");" "$FIRE_SPACE_JSON";
        curl -fsS -X POST "http://127.0.0.1:$PORT/api/events/fire" -H "X-Alice-Local-Api-Token: $API_TOKEN" -H "Content-Type: application/json" -d "{\"eventType\":\"keyPress\",\"payload\":{\"key\":\"ArrowUp\"}}" >"$FIRE_ARROW_JSON";
        node -e "const fs=require(\"fs\"); const d=JSON.parse(fs.readFileSync(process.argv[1], \"utf8\")); if (!Array.isArray(d.triggered)) throw new Error(\"ArrowUp triggered is not an array\"); if (d.triggered.length !== 0) throw new Error(\"expected no ArrowUp handlers\");" "$FIRE_ARROW_JSON";
        curl -fsS -X POST "http://127.0.0.1:$PORT/api/events/fire" -H "X-Alice-Local-Api-Token: $API_TOKEN" -H "Content-Type: application/json" -d "{\"eventType\":\"proximity\",\"payload\":{\"sourceObject\":\"bunny\"}}" >"$FIRE_PROXIMITY_JSON";
        node -e "const fs=require(\"fs\"); const d=JSON.parse(fs.readFileSync(process.argv[1], \"utf8\")); if (!Array.isArray(d.triggered)) throw new Error(\"proximity triggered is not an array\"); if (d.triggered.length !== 1) throw new Error(\"expected one proximity handler\"); if (d.triggered[0].id !== \"evt-3\") throw new Error(\"proximity handler id mismatch\");" "$FIRE_PROXIMITY_JSON";
        HTTP_CODE="$(curl -sS -o "$FIRE_MISSING_TYPE_JSON" -w "%{http_code}" -X POST "http://127.0.0.1:$PORT/api/events/fire" -H "X-Alice-Local-Api-Token: $API_TOKEN" -H "Content-Type: application/json" -d "{}")";
        test "$HTTP_CODE" = 400;
        node -e "const fs=require(\"fs\"); const d=JSON.parse(fs.readFileSync(process.argv[1], \"utf8\")); if (d.error !== \"eventType is required\") throw new Error(\"missing fire eventType error mismatch\");" "$FIRE_MISSING_TYPE_JSON";
        HTTP_CODE="$(curl -sS -o "$FIRE_UNKNOWN_TYPE_JSON" -w "%{http_code}" -X POST "http://127.0.0.1:$PORT/api/events/fire" -H "X-Alice-Local-Api-Token: $API_TOKEN" -H "Content-Type: application/json" -d "{\"eventType\":\"bogus\"}")";
        test "$HTTP_CODE" = 400;
        node -e "const fs=require(\"fs\"); const d=JSON.parse(fs.readFileSync(process.argv[1], \"utf8\")); if (!d.error.includes(\"unknown eventType\")) throw new Error(\"unknown fire eventType error mismatch\");" "$FIRE_UNKNOWN_TYPE_JSON";
        kill "$SERVER_PID";
        wait "$SERVER_PID" 2>/dev/null || true;
        SERVER_PID="";
        grep -q "shutting down" "$SERVER_LOG"'
      timeout: 60000
      expected: ""
