# Level 3: Tweedle AST Extraction and VM Execution
# Tests the Tweedle virtual machine: launch a project, execute methods via
# POST /api/world/run, verify the execution log structure.
# Java parity: VirtualMachine.execute()

scenario:
  name: "Tweedle AST & VM Execution"
  description: |
    Verifies the Tweedle virtual machine pipeline: parse .a3p project to
    extract AST, execute all methods, and produce a structured execution
    log. Maps to Java Alice's VirtualMachine.execute() pipeline.
  type: cli
  level: 3
  metadata:
    flow: server-flow

  tags: [alice, integration, tweedle, vm, execution, java-parity, server-flow]

  agents:
    - name: cli
      type: cli

  prerequisites:
    - "npm run build:server has been run"
    - "Valid .a3p file with at least one Tweedle method at A3P_FILE path"

  steps:
    - name: "Run A3P Tweedle VM execution flow"
      agent: cli
      action: execute
      target: >-
        bash -lc 'set -euo pipefail;
        PORT="${PORT:-3102}";
        case "$PORT" in (*[!0-9]*|"") echo "PORT must be numeric" >&2; exit 2;; esac;
        API_TOKEN="gadugi-local-api-token";
        EVIDENCE_DIR="./evidence/02-tweedle-ast-vm-execution-$$";
        A3P_FILE="${A3P_FILE:-.test-roundtrip/modified.a3p}";
        test -f "$A3P_FILE" || { echo "A3P_FILE does not exist: $A3P_FILE" >&2; exit 2; };
        case "$EVIDENCE_DIR" in (""|"/"|".") echo "unsafe EVIDENCE_DIR: $EVIDENCE_DIR" >&2; exit 2;; esac;
        HEALTH_JSON="$EVIDENCE_DIR/health.json";
        LAUNCH_JSON="$EVIDENCE_DIR/launch.json";
        RUN_JSON="$EVIDENCE_DIR/run-world.json";
        SERVER_LOG="$EVIDENCE_DIR/server.log";
        SERVER_PID="";
        rm -rf "$EVIDENCE_DIR";
        mkdir -p "$EVIDENCE_DIR";
        cleanup() { status=$?; if [ -n "${SERVER_PID:-}" ] && kill -0 "$SERVER_PID" 2>/dev/null; then kill "$SERVER_PID" 2>/dev/null || true; wait "$SERVER_PID" 2>/dev/null || true; fi; rm -rf "$EVIDENCE_DIR"; exit "$status"; };
        trap cleanup EXIT;
        node dist-server/cli.js serve --port "$PORT" --evidence-dir "$EVIDENCE_DIR" --api-token "$API_TOKEN" --project "$A3P_FILE" >"$SERVER_LOG" 2>&1 &
        SERVER_PID=$!;
        READY=0;
        for attempt in $(seq 1 50); do if curl -fsS "http://127.0.0.1:$PORT/api/health" >"$HEALTH_JSON" 2>/dev/null; then READY=1; break; fi; sleep 0.2; done;
        test "$READY" = 1;
        grep -Eq "\"status\"[[:space:]]*:[[:space:]]*\"listening\"" "$SERVER_LOG";
        node -e "const fs=require(\"fs\"); const d=JSON.parse(fs.readFileSync(process.argv[1], \"utf8\")); if (d.status !== \"running\") throw new Error(\"health status was not running\");" "$HEALTH_JSON";
        curl -fsS -X POST "http://127.0.0.1:$PORT/api/launch" -H "X-Alice-Local-Api-Token: $API_TOKEN" -H "Content-Type: application/json" -d "{\"project\":\"$A3P_FILE\"}" >"$LAUNCH_JSON";
        node -e "const fs=require(\"fs\"); const d=JSON.parse(fs.readFileSync(process.argv[1], \"utf8\")); if (d.status !== \"launched\") throw new Error(\"project did not launch\");" "$LAUNCH_JSON";
        curl -fsS -X POST "http://127.0.0.1:$PORT/api/world/run" -H "X-Alice-Local-Api-Token: $API_TOKEN" -H "Content-Type: application/json" -d "{}" >"$RUN_JSON";
        node -e "const fs=require(\"fs\"); const d=JSON.parse(fs.readFileSync(process.argv[1], \"utf8\")); if (d.status !== \"completed\") throw new Error(\"VM did not complete\"); if (d.schema_version !== \"eatme.alice-run-world-result/v1\") throw new Error(\"unexpected schema version\"); if (d.statements_executed < 1) throw new Error(\"expected at least one executed statement\"); if (!Array.isArray(d.execution_log)) throw new Error(\"execution_log is not an array\"); if (d.scene_object_count < 2) throw new Error(\"expected at least 2 scene objects\"); if (d.procedure_count < 1) throw new Error(\"expected at least one procedure\"); if (!Array.isArray(d.errors) || d.errors.length !== 0) throw new Error(\"expected no VM errors\"); if (d.run_duration_ms < 0) throw new Error(\"negative run duration\");" "$RUN_JSON";
        kill "$SERVER_PID";
        wait "$SERVER_PID" 2>/dev/null || true;
        SERVER_PID="";
        grep -q "shutting down" "$SERVER_LOG"'
      timeout: 30000
      expected: ""
