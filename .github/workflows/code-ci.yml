name: Code CI

on:
  pull_request:
    paths:
      - 'src/**'
      - 'test/**'
      - 'e2e/**'
      - 'gadugi/**'
      - '.test-roundtrip/**'
      - 'amplihack_cli.py'
      - 'test_amplihack_cli.py'
      - 'pyproject.toml'
      - 'package.json'
      - 'package-lock.json'
      - 'playwright.config.*'
      - 'tsconfig*.json'
      - 'vite.config.*'
      - 'vitest.config.*'
      - '.github/workflows/**'
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'test/**'
      - 'e2e/**'
      - 'gadugi/**'
      - '.test-roundtrip/**'
      - 'amplihack_cli.py'
      - 'test_amplihack_cli.py'
      - 'pyproject.toml'
      - 'package.json'
      - 'package-lock.json'
      - 'playwright.config.*'
      - 'tsconfig*.json'
      - 'vite.config.*'
      - 'vitest.config.*'
      - '.github/workflows/**'

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm run build:server
      - run: python3 -m unittest test_amplihack_cli.py
      - run: npm test
      - run: npm run test:gadugi
      - run: npx --no-install playwright install chromium
      - run: npm run test:e2e
      - run: npm run test:coverage
