<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alice 3 Web Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; display: flex; height: 100vh; background: #1a1a2e; color: #eee; }

    #sidebar {
      width: 280px; min-width: 200px;
      background: #16213e; padding: 16px;
      display: flex; flex-direction: column; gap: 12px;
      overflow-y: auto;
    }
    #sidebar h1 { font-size: 1.1rem; color: #e94560; }
    #sidebar label { font-size: 0.85rem; color: #aaa; }
    #status { font-size: 0.8rem; color: #0f3460; background: #e2e2e2; padding: 6px 8px; border-radius: 4px; }
    #object-list, #asset-list { list-style: none; font-size: 0.82rem; line-height: 1.6; }
    #object-list li, #asset-list li { padding: 2px 0; border-bottom: 1px solid #1a1a3e; }
    #object-list li { cursor: pointer; }
    #object-list li[data-selected="true"] { color: #fff; background: #0f3460; }
    #object-list small, #asset-list small { color: #888; }
    button { padding: 6px 8px; border: 0; border-radius: 4px; background: #e94560; color: #fff; cursor: pointer; }
    input { max-width: 100%; }
    #webxr-status { font-size: 0.78rem; color: #0f3460; background: #d8eef8; padding: 6px 8px; border-radius: 4px; }
    #webxr-status button { width: 100%; margin-bottom: 6px; padding: 4px 6px; }
    #webxr-status ul { margin-top: 4px; padding-left: 16px; }
    #camera-panel { display: flex; flex-direction: column; gap: 8px; font-size: 0.82rem; }
    #camera-panel h2 { font-size:0.9rem; margin-top:8px; }
    #camera-panel button, #camera-panel select, #camera-panel input {
      font: inherit;
      border: 0;
      border-radius: 4px;
      padding: 6px 8px;
    }
    #camera-panel button { background: #e94560; color: #fff; cursor: pointer; }
    #camera-panel button.secondary { background: #0f3460; }
    #camera-panel .button-row { display: flex; gap: 6px; flex-wrap: wrap; }
    #camera-status { color: #d7e3fc; }
    #camera-position, #camera-mode { color: #fff; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; }
    #camera-marker-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    #camera-marker-list li { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    #camera-marker-list span { flex: 1 1 auto; }

    #viewport-container { flex: 1; position: relative; }
    #viewport { width: 100%; height: 100%; display: block; }
  </style>
</head>
<body>
  <div id="sidebar">
    <h1>🐇 Alice 3 Web Viewer</h1>
    <label>Load .a3p project file:
      <input id="file-input" data-testid="alice-open-project-input" type="file" accept=".a3p" />
    </label>
    <label>Import glTF/GLB model:
      <input id="model-file-input" data-testid="alice-import-model-input" type="file" accept=".gltf,.glb" />
    </label>
    <label>Import image texture:
      <input id="texture-file-input" data-testid="alice-import-texture-input" type="file" accept=".png,.jpg,.jpeg,.webp" />
    </label>
    <button id="create-shape-button" data-testid="alice-create-shape-button" type="button">Create shape</button>
    <button id="assign-texture-button" data-testid="alice-apply-texture-button" type="button">Apply texture to selected shape</button>
    <section id="selected-object-transform-panel" aria-label="Alice selected object actions">
      <h2 style="font-size:0.9rem; margin-top:8px;">Selected object</h2>
      <button id="move-selected-object-button" data-testid="alice-move-selected-object-button" type="button">Move selected object</button>
      <button id="turn-selected-object-button" data-testid="alice-turn-selected-object-button" type="button">Turn selected object</button>
      <button id="resize-selected-object-button" data-testid="alice-resize-selected-object-button" type="button">Resize selected object</button>
    </section>
    <button id="export-a3p-button" data-testid="alice-save-project-button" type="button">Save project</button>
    <button id="export-web-package-button" type="button">Export web package</button>
    <button id="share-web-package-button" type="button">Share web package</button>
    <div id="status">No project loaded</div>
    <div id="webxr-status">
      <button type="button" data-alice-webxr-vr-button="disabled" disabled>VR unavailable</button>
      <div data-alice-webxr-status="idle">Load an Alice scene to check VR support.</div>
      <ul data-alice-webxr-evidence="true"></ul>
    </div>
    <section id="camera-panel" data-testid="camera-panel" aria-label="Alice camera workflow">
      <h2>Camera</h2>
      <div id="camera-status" data-testid="camera-status">Camera ready</div>
      <div>Mode: <span id="camera-mode" data-testid="camera-mode">orbit</span></div>
      <div>Position: <span id="camera-position" data-testid="camera-position"></span></div>
      <label>View
        <select id="camera-preset" data-testid="camera-preset">
          <option value="home">Home</option>
          <option value="front">Front</option>
          <option value="back">Back</option>
          <option value="left">Left</option>
          <option value="right">Right</option>
          <option value="top">Top</option>
          <option value="isometric">Isometric</option>
        </select>
      </label>
      <div class="button-row">
        <button id="camera-move-forward" data-testid="camera-move-forward" type="button">Move forward</button>
        <button id="camera-first-person-toggle" data-testid="camera-first-person-toggle" class="secondary" type="button">Toggle first-person</button>
      </div>
      <label>Marker name
        <input id="camera-marker-name" data-testid="camera-marker-name" type="text" maxlength="80" />
      </label>
      <button id="camera-save-marker" data-testid="camera-save-marker" type="button">Save marker</button>
      <ul id="camera-marker-list" data-testid="camera-marker-list" aria-label="Camera markers"></ul>
    </section>
    <section id="joint-panel" aria-label="Alice joint workflow">
      <h2 style="font-size:0.9rem; margin-top:8px;">Joints</h2>
      <label>Joint object
        <select id="joint-object-select"></select>
      </label>
      <label>Pose name
        <input id="joint-pose-name" type="text" maxlength="80" />
      </label>
      <button id="joint-apply-pose" type="button">Apply joint pose</button>
    </section>
    <h2 style="font-size:0.9rem; margin-top:8px;">Imported Assets</h2>
    <ul id="asset-list" data-testid="alice-imported-asset-list"></ul>
    <h2 style="font-size:0.9rem; margin-top:8px;">Scene Objects</h2>
    <ul id="object-list" data-testid="alice-scene-object-list"></ul>
  </div>
  <div id="viewport-container">
    <canvas id="viewport"></canvas>
  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
